/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — كأس العالم 2026
   Aesthetic: Editorial Dark + Gold Luxury
   ════════════════════════════════════════════ */
:root{
  --bg:       #f5f7f5;
  --surface:  #ffffff;
  --card:     #ffffff;
  --border:   rgba(0,0,0,.09);
  --green:    #007a3d;
  --green2:   #00a651;
  --gold:     #a07830;
  --gold2:    #c9a84c;
  --red:      #d63031;
  --text:     #111d14;
  --muted:    #5a7a62;
  --live-glow:0 0 16px rgba(214,48,49,.25);
  --gold-glow:0 0 20px rgba(160,120,48,.15);
  --nav-bg:   rgba(255,255,255,.94);
  font-size:16px;
}

/* ── DARK MODE ── */
[data-theme="dark"]{
  --bg:       #080f0a;
  --surface:  #0e1a10;
  --card:     #111d14;
  --border:   rgba(255,255,255,.07);
  --green:    #00a651;
  --green2:   #00c96a;
  --gold:     #c9a84c;
  --gold2:    #e8c96a;
  --red:      #e74c3c;
  --text:     #f0f4f1;
  --muted:    #7a9480;
  --live-glow:0 0 20px rgba(231,76,60,.4);
  --gold-glow:0 0 30px rgba(201,168,76,.2);
  --nav-bg:   rgba(8,15,10,.92);
}
/* light defaults — applied globally */
body::before{ opacity:.2; }
.score-num{ background:#f0f5f1; }
.modal-sheet{ background:#f9fbf9; }
.side-card{ box-shadow:0 2px 12px rgba(0,0,0,.06); }
.match-card{ box-shadow:0 2px 8px rgba(0,0,0,.05); }
.channel-item{ background:#f5f7f5; }
.tabs-bar{ background:#eef2ee; }
.date-btn{ background:#fff; }

/* dark mode overrides */
[data-theme="dark"] body::before{ opacity:.6; filter:none; }
[data-theme="dark"] .hero{
  background:
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,166,81,.18) 0%, transparent 70%),
    var(--bg);
}
[data-theme="dark"] .score-num{ background:var(--surface); }
[data-theme="dark"] .modal-sheet{ background:var(--surface); }
[data-theme="dark"] .side-card{ box-shadow:none; }
[data-theme="dark"] .match-card{ box-shadow:none; }
[data-theme="dark"] .channel-item{ background:var(--surface); }
[data-theme="dark"] .tabs-bar{ background:var(--surface); }
[data-theme="dark"] .date-btn{ background:var(--card); }
[data-theme="dark"] ::-webkit-scrollbar-track{ background:var(--bg); }

/* ── THEME TRANSITION ── */
*, *::before, *::after{
  transition-property: background-color, border-color, color, box-shadow;
  transition-duration: .25s;
  transition-timing-function: ease;
}
/* استثناء الأنيميشن من التأثير */
.loader::after, .live-dot, .match-card.live-card, .nav-live-badge{
  transition: none;
}

/* ── THEME TOGGLE BUTTON ── */
.theme-toggle{
  width:38px;height:38px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;flex-shrink:0;
  transition:background .2s,border-color .2s,transform .2s;
}
.theme-toggle:hover{
  background:rgba(0,166,81,.12);
  border-color:rgba(0,166,81,.3);
  transform:scale(1.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}

/* ── NOISE TEXTURE overlay ── */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.6;
}

/* ── NAVBAR ── */
.nav{
  position:sticky;top:0;z-index:100;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 max(20px, 4vw);
  display:flex;align-items:center;gap:16px;
  height:62px;
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
}
.nav-logo img{width:36px;height:36px;object-fit:contain;border-radius:8px}
.nav-logo .logo-icon{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:900;color:#fff;flex-shrink:0;
}
.nav-title{font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:900;color:var(--text)}
.nav-title span{color:var(--gold)}

.nav-tabs{
  display:flex;align-items:center;gap:4px;
  margin-right:auto;
}
.nav-tab{
  padding:6px 14px;border-radius:8px;font-size:.85rem;font-weight:700;
  color:var(--muted);cursor:pointer;border:none;background:none;
  font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap;
}
.nav-tab.active,.nav-tab:hover{color:var(--text);background:rgba(255,255,255,.07)}
.nav-tab.active{color:var(--green2)}

.nav-live-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);
  padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;color:var(--red);
  margin-right:8px;animation:pulse-border 2s infinite;cursor:pointer;
  white-space:nowrap;
}
@keyframes pulse-border{
  0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.3)}
  50%{box-shadow:0 0 0 6px rgba(231,76,60,0)}
}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}


/* ── MAIN LAYOUT ── */
.main{
  max-width:1200px;margin:0 auto;
  padding:30px max(16px,3vw);
  display:grid;grid-template-columns:1fr 340px;gap:28px;
}
@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .col-sidebar,.sidebar{display:none!important}
}
@media(max-width:640px){
  body{font-size:14px}
  .nav{padding:10px 0px;flex-wrap:wrap;gap:8px}
  .nav-logo{padding-right:14px;}
  .theme-toggle {position: absolute;left:14px;}
  .nav-tabs{order:3;width:100%;justify-content:center;
    background:var(--surface);padding:4px;margin:0}
  /* .nav-tabs{order:3;width:100%;justify-content:center;
    background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:4px;margin:0} */
  .nav-tab{flex:1;text-align:center;padding:7px 6px;font-size:.8rem}
  .nav-live-badge{margin:0 auto}
  .main{padding:60px 10px;gap:0}
  .match-card{padding:10px 12px}
  .team-flag{width:38px!important;height:38px!important}
  .team-name{font-size:.75rem}
  .score-box{font-size:1.2rem}
  .score-num{width:30px!important;height:30px!important;font-size:1rem!important}
  .match-comp,.match-meta{font-size:.62rem}
  .ch-grid{grid-template-columns:repeat(3,1fr)!important}
  .ch-card-name{font-size:.65rem}
  .news-card{padding:10px}
  .news-thumb{width:72px!important;height:56px!important}
  .date-strip{gap:6px}
  .date-btn{min-width:48px;padding:7px 8px;font-size:.72rem}
  .md-teams-row{gap:8px}
  .md-team-name{font-size:.9rem}
  .md-score-num{width:42px!important;height:42px!important;font-size:1.7rem!important}
  .match-detail-page{padding:10px 0 40px}
  .back-btn,.md-back{font-size:.82rem;padding:7px 12px}
  .nd-body p{font-size:.92rem;line-height:1.7}
  .nd-hero-img{border-radius:10px}
  .md-lineup-section{border-radius:12px}
  .md-player-avatar{width:30px;height:30px}
  .md-player-name{font-size:.78rem}
}

/* ── SECTION HEADER ── */
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-hdr h2{
  font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:900;
  display:flex;align-items:center;gap:8px;
}
.section-hdr h2 .ico{
  width:28px;height:28px;border-radius:7px;
  background:rgba(0,166,81,.15);border:1px solid rgba(0,166,81,.3);
  display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--green2);
}
.see-all{
  font-size:.78rem;color:var(--muted);cursor:pointer;
  border:none;background:none;font-family:'Cairo',sans-serif;font-weight:700;
  text-decoration:underline;text-underline-offset:3px;
  transition:color .2s;
}
.see-all:hover{color:var(--green2)}

/* ── TABS BAR ── */
.tabs-bar{
  display:flex;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:5px;margin-bottom:20px;
  overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:700;
  cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif;
  color:var(--muted);white-space:nowrap;transition:all .2s;
}
.tab-btn.active{background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(0,166,81,.3)}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.05);color:var(--text)}

/* ── MATCH CARD ── */
.matches-list{display:flex;flex-direction:column;gap:10px}

.match-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;
  display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  cursor:pointer;position:relative;overflow:hidden;
}
.match-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,166,81,.04),transparent 60%);
  pointer-events:none;
}
.match-card:hover{
  border-color:rgba(0,166,81,.3);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}

.match-card.live-card{
  border-color:rgba(231,76,60,.3);
  box-shadow:var(--live-glow);
  animation:live-pulse 3s infinite;
}
@keyframes live-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.2),var(--live-glow)}
  50%{box-shadow:0 0 0 8px rgba(231,76,60,0),var(--live-glow)}
}

.match-team{
  display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
}
.match-team.away{align-items:center}
.team-flag{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--surface),var(--card));
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
  transition:transform .2s;
}
.match-card:hover .team-flag{transform:scale(1.08)}
.team-name{font-size:.82rem;font-weight:700;color:var(--text);line-height:1.2}

.match-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.score-box{
  display:flex;align-items:center;gap:8px;
  font-family:'Tajawal',sans-serif;font-size:1.5rem;font-weight:900;
}
.score-num{
  background:var(--surface);border:1px solid var(--border);
  width:38px;height:38px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.score-sep{color:var(--muted);font-size:1rem}

.match-badge{
  font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.5px;
}
.badge-live{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:var(--red);display:flex;align-items:center;gap:4px}
.badge-upcoming{background:rgba(0,166,81,.1);border:1px solid rgba(0,166,81,.25);color:var(--green2)}
.badge-finished{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}

.match-meta{font-size:.7rem;color:var(--muted);text-align:center;line-height:1.6}
.match-comp{font-size:.68rem;color:var(--gold);font-weight:700}
.match-time-big{
  font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:700;
  color:var(--muted);
}

/* ── NEWS CARD ── */
.news-grid{display:flex;flex-direction:column;gap:12px}

.news-card{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px;cursor:pointer;
  transition:border-color .2s,transform .2s;
}
.news-card:hover{border-color:rgba(0,166,81,.25);transform:translateX(-3px)}

.news-img{
  width:82px;height:72px;flex-shrink:0;
  border-radius:10px;object-fit:cover;
  background:linear-gradient(135deg,var(--surface),var(--card));
}
.news-img-placeholder{
  width:82px;height:72px;flex-shrink:0;border-radius:10px;
  background:linear-gradient(135deg,#0e1a10,#1a2e1a);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:var(--muted);
}
.news-body{flex:1;min-width:0}
.news-cat{
  font-size:.65rem;font-weight:700;color:var(--gold);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;
}
.news-title{
  font-size:.9rem;font-weight:700;color:var(--text);
  line-height:1.4;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.news-footer{display:flex;align-items:center;gap:10px;font-size:.7rem;color:var(--muted)}
.news-footer i{font-size:.65rem}

/* ── SIDEBAR ── */
.sidebar{display:flex;flex-direction:column;gap:20px}

/* ── SIDEBAR CARD ── */
.side-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;
}
.side-hdr-btn{
  background:none;border:none;color:var(--green2);font-size:.75rem;
  font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  padding:2px 6px;border-radius:8px;
  transition:background .15s;
}
.side-hdr-btn:hover{background:rgba(0,166,81,.1);}
.side-card-hdr{
  padding:14px 18px;border-bottom:1px solid var(--border);
  font-size:.85rem;font-weight:900;font-family:'Tajawal',sans-serif;
  display:flex;align-items:center;justify-content:space-between;
}
.side-card-body{padding:14px}

/* ── CHANNELS SIDEBAR ── */
.channel-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;transition:all .2s;
  text-decoration:none;color:inherit;margin-top:5px;
}
.channel-item:hover{border-color:rgba(0,166,81,.3);background:rgba(0,166,81,.06)}
.channel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.channel-logo{width:32px;height:32px;border-radius:7px;object-fit:contain;flex-shrink:0}
.channel-logo-placeholder{
  width:32px;height:32px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
}
.channel-name{font-size:.85rem;font-weight:700;flex:1}
.channel-play{font-size:.75rem;color:var(--green2)}

/* ── CHANNELS FULL PAGE ── */
.ch-toolbar{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:18px;
}
.ch-search-wrap{
  flex:1;min-width:200px;position:relative;
}
.ch-search-wrap i{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:.8rem;pointer-events:none;
}
.ch-search{
  width:100%;padding:9px 36px 9px 14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;
  font-size:.85rem;outline:none;transition:border-color .2s;
}
.ch-search:focus{border-color:rgba(0,166,81,.4)}
.ch-search::placeholder{color:var(--muted)}
/* القنوات شبكة بطاقات */
.ch-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:12px;
}
.ch-card{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:18px 12px 14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;cursor:pointer;
  text-decoration:none;color:inherit;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.ch-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(0,166,81,.04));
  pointer-events:none;
}
.ch-card:hover{
  transform:translateY(-3px);
  border-color:rgba(0,166,81,.35);
  box-shadow:0 8px 24px rgba(0,0,0,.1);
}
.ch-card-logo{
  width:56px;height:56px;border-radius:12px;object-fit:contain;
  background:var(--surface);border:1px solid var(--border);padding:4px;
}
.ch-card-logo-placeholder{
  width:56px;height:56px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:900;
  border:1px solid var(--border);
}
.ch-card-name{
  font-size:.82rem;font-weight:700;text-align:center;
  line-height:1.3;color:var(--text);
}
.ch-card-badge{
  font-size:.65rem;padding:2px 8px;border-radius:10px;
  background:rgba(0,166,81,.1);color:var(--green2);
  border:1px solid rgba(0,166,81,.2);font-weight:700;
}
.ch-no-results{
  grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);
}
.ch-no-results i{font-size:2rem;margin-bottom:10px;display:block}

.date-strip{
  display:flex;
  gap:6px;
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:4px;
  scrollbar-width:none;
  margin-bottom:20px;
  width:300px;
  margin:10px auto;
  flex-wrap:nowrap;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}

.date-strip::-webkit-scrollbar{
  display:none;
}

.date-strip{-ms-overflow-style:none;}

.date-btn{
  flex-shrink:0;
  min-width:70px;
  padding:8px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  transition:all .2s;
  text-align:center;
  white-space:nowrap;
  user-select:none;
}

.date-btn .date-day{
  font-size:.68rem;
  color:var(--muted);
  display:block;
}

.date-btn .date-label{
  font-size:.82rem;
  font-weight:700;
  color:var(--text);
}

.date-btn.active{
  background:var(--green);
  border-color:var(--green);
  box-shadow:0 4px 14px rgba(0,166,81,.3);
}

.date-btn.active .date-day,
.date-btn.active .date-label{
  color:#fff;
}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;max-width:600px;max-height:90vh;overflow-y:auto;
  background:var(--surface);border-radius:20px 20px 0 0;
  border:1px solid var(--border);border-bottom:none;
  padding:24px;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{
  font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:900;margin-bottom:16px;
}
.modal-close{
  position:absolute;top:16px;left:16px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.07);border:none;
  color:var(--muted);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.modal-close:hover{background:rgba(255,255,255,.12);color:var(--text)}
.modal-sheet{position:relative}

/* ── MATCH MODAL ── */
.modal-match-header{
  display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;
  text-align:center;margin-bottom:24px;
  padding:20px;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,166,81,.08),rgba(201,168,76,.05));
  border:1px solid var(--border);
}
.modal-team-flag{font-size:2.5rem;margin-bottom:8px}
.modal-team-name{font-size:1rem;font-weight:900}
.modal-score-area{text-align:center}
.modal-score{
  font-family:'Tajawal',sans-serif;font-size:2.4rem;font-weight:900;
  color:var(--green2);
}
.modal-score-sep{color:var(--muted);margin:0 4px}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.modal-info-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px;text-align:center;
}
.modal-info-label{font-size:.68rem;color:var(--muted);margin-bottom:4px}
.modal-info-val{font-size:.9rem;font-weight:700}

/* ── NEWS MODAL ── */
.news-modal-img{
  width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:16px;
}
.news-modal-title{font-family:'Tajawal',sans-serif;font-size:1.3rem;font-weight:900;line-height:1.4;margin-bottom:12px}
.news-modal-meta{display:flex;gap:12px;font-size:.75rem;color:var(--muted);margin-bottom:16px}
.news-modal-content{font-size:.9rem;line-height:1.9;color:rgba(240,244,241,.8)}

/* ── EMPTY & LOADING ── */
.empty{
  text-align:center;padding:50px 20px;color:var(--muted);
}
.empty i{font-size:2rem;margin-bottom:10px;display:block}
.empty p{font-size:.9rem}
.loader{
  display:flex;justify-content:center;padding:40px;
}
.loader::after{
  content:'';width:32px;height:32px;
  border:3px solid var(--border);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--border);
  padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:700;
  z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(0,166,81,.4);color:var(--green2)}
.toast.error{border-color:rgba(231,76,60,.4);color:var(--red)}

/* ── NEWS DETAIL PAGE ── */
.news-detail-page{
  flex:1;min-width:0;
  max-width:800px;margin:0 auto;
}
.news-detail-page .back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:10px;font-size:.84rem;font-weight:700;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  cursor:pointer;margin-bottom:20px;text-decoration:none;
  transition:all .2s;font-family:'Cairo',sans-serif;
}
.news-detail-page .back-btn:hover{border-color:rgba(0,166,81,.3);color:var(--green2)}
.nd-label{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.nd-title{font-family:'Tajawal',sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:900;line-height:1.35;color:var(--text);margin-bottom:14px}
.nd-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:.78rem;color:var(--muted);margin-bottom:20px;align-items:center}
.nd-meta i{margin-left:5px;color:var(--green2)}
.nd-hero-img{width:100%;max-height:420px;object-fit:cover;border-radius:16px;margin-bottom:24px;display:block}
.nd-body{font-size:1rem;line-height:1.95;color:var(--text);opacity:.88}
.nd-body p{margin-bottom:14px}
.nd-share{
  margin-top:32px;padding-top:20px;border-top:1px solid var(--border);
}
.nd-share h3{font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:12px}
.nd-share-btns{display:flex;gap:10px;flex-wrap:wrap}
.nd-share-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:10px;font-size:.82rem;font-weight:700;
  text-decoration:none;cursor:pointer;border:none;font-family:'Cairo',sans-serif;
  transition:transform .15s,box-shadow .15s;
}
.nd-share-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.nd-share-btn.whatsapp{background:#25d366;color:#fff}
.nd-share-btn.twitter {background:#1da1f2;color:#fff}
.nd-share-btn.facebook{background:#1877f2;color:#fff}
.nd-share-btn.copy    {background:var(--card);border:1px solid var(--border);color:var(--text)}
.nd-related{margin-top:32px}
.nd-related h3{font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:900;margin-bottom:14px;color:var(--text)}

/* ── MATCH DETAIL PAGE ── */
.match-detail-page{
  flex:1;min-width:0;
}
.md-back{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:10px;font-size:.84rem;font-weight:700;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  cursor:pointer;margin-bottom:20px;font-family:'Cairo',sans-serif;
  transition:all .2s;border:none;
}
.md-back:hover{background:rgba(0,166,81,.1);color:var(--green2)}

/* بطاقة النتيجة الرئيسية */
.md-scoreboard{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px 20px;
  margin-bottom:20px;position:relative;overflow:hidden;
}
.md-scoreboard::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,166,81,.08),transparent 70%);
  pointer-events:none;
}
[data-theme="dark"] .md-scoreboard::before{
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,166,81,.15),transparent 70%);
}
.md-comp-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:20px;
}
.md-comp-badge{
  font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;
  background:rgba(0,166,81,.1);border:1px solid rgba(0,166,81,.2);
  color:var(--green2);
}
.md-teams-row{
  display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;
}
.md-team{display:flex;flex-direction:column;align-items:center;gap:10px}
.md-team-flag-wrap{
  width:72px;height:72px;border-radius:50%;
  background:var(--surface);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;position:relative;overflow:hidden;
}
.md-team-flag-img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.md-team-name{font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:900;text-align:center}
.md-team-en  {font-size:.72rem;color:var(--muted);text-align:center}

.md-score-area{text-align:center}
.md-score{
  font-family:'Tajawal',sans-serif;font-size:3rem;font-weight:900;
  color:var(--text);line-height:1;
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.md-score-num{
  background:var(--surface);border:1px solid var(--border);
  width:60px;height:60px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
}
.md-score-sep{color:var(--muted);font-size:1.8rem}
.md-status-badge{
  margin:10px auto 0;width:fit-content;
  font-size:.75rem;font-weight:700;padding:5px 14px;border-radius:20px;
  display:flex;align-items:center;gap:6px;
}

/* معلومات إضافية */
.md-info-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:16px;overflow:hidden;
}
.md-info-card-title{
  font-family:'Tajawal',sans-serif;font-size:.92rem;font-weight:900;
  padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--surface),var(--card));
  color:var(--text);letter-spacing:.02em;border-radius:16px 16px 0 0;
}
.md-info-rows{display:flex;flex-direction:column;}
.md-info-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.md-info-row:last-child{border-bottom:none}
.md-info-row:hover{background:var(--surface)}
.md-info-row-icon{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;flex-shrink:0;
}
.md-info-row-body{flex:1;min-width:0}
.md-info-row-label{font-size:.68rem;color:var(--muted);font-weight:600;margin-bottom:1px}
.md-info-row-val{font-size:.86rem;font-weight:700;color:var(--text);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ألوان أيقونات المعلومات */
.md-icon-date    {background:rgba(99,102,241,.12);color:#6366f1}
.md-icon-time    {background:rgba(34,197,94,.12); color:#22c55e}
.md-icon-stadium {background:rgba(249,115,22,.12);color:#f97316}
.md-icon-city    {background:rgba(14,165,233,.12);color:#0ea5e9}
.md-icon-referee {background:rgba(168,85,247,.12);color:#a855f7}
.md-icon-cap     {background:rgba(201,168,76,.12);color:var(--gold)}
.md-icon-stage   {background:rgba(0,166,81,.12);  color:var(--green2)}
/* legacy - keep for compatibility */
.md-info-grid{display:none}
.md-info-item{display:none}

/* القنوات الناقلة */
.md-channels-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:18px;margin-bottom:20px;
}
.md-section-title{
  font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:900;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.md-channels-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;
}
.md-ch-card{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 10px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  text-decoration:none;color:inherit;
  transition:transform .2s,border-color .2s;
}
.md-ch-card:hover{transform:translateY(-2px);border-color:rgba(0,166,81,.35)}
.md-ch-logo{
  width:48px;height:48px;border-radius:10px;object-fit:contain;
  background:var(--card);border:1px solid var(--border);padding:3px;
}
.md-ch-placeholder{
  width:48px;height:48px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:900;border:1px solid var(--border);
}
.md-ch-name{font-size:.75rem;font-weight:700;text-align:center;line-height:1.2}
.md-ch-play{
  font-size:.65rem;padding:2px 8px;border-radius:8px;
  background:rgba(0,166,81,.1);color:var(--green2);
  border:1px solid rgba(0,166,81,.2);font-weight:700;
}

/* md-events removed */

/* ══ MATCH EVENTS — new timeline ══ */
.md-events-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:18px;margin-bottom:20px;
}

/* منطقة الأحداث */
#md-ev-area{
  position:relative;
}
#md-ev-area::before{
  content:'';width:1px;height:100%;position:absolute;
  top:0;right:calc(50% - 0.5px);background:var(--border);
}
.md-ev-row{
  position:relative;height:48px;
  width:calc(50% - 28px);
  display:flex;align-items:center;
}
.md-ev-row.home{direction:ltr;padding-left:24px;}
.md-ev-row.away{margin-right:50%;padding-right:24px;}
/* الدقيقة */
.md-ev-row::after{
  content:attr(data-min);position:absolute;
  width:44px;height:24px;text-align:center;
  background:var(--card);color:var(--text);
  font-family:'Cairo',sans-serif;font-size:.72rem;font-weight:700;
  border:1px solid var(--border);border-radius:6px;
  line-height:24px;direction:ltr;
}
.md-ev-row.home::after{left:calc(-44px / 2);}
.md-ev-row.away::after{right:calc(-44px / 2);}
/* أيقونة الحدث */
.md-ev-icon{
  width:22px;height:22px;object-fit:contain;flex-shrink:0;
}
.md-ev-row.home .md-ev-icon{margin-left:6px}
.md-ev-row.away .md-ev-icon{margin-right:6px}
/* النص */
.md-ev-text{
  min-width:0;overflow:hidden;
}
.md-ev-row.home .md-ev-text{margin-left:4px;text-align:left}
.md-ev-row.away .md-ev-text{margin-right:4px;text-align:right}
.md-ev-name{
  font-size:.78rem;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.md-ev-sub{
  font-size:.68rem;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.md-ev-sub.in {color:var(--green2)}
.md-ev-sub.out{color:var(--red)}
/* فواصل الأشواط */
.md-ev-break{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 0;margin:8px 0;position:relative;z-index:1;
}
.md-ev-break-line{flex:1;height:1px;background:var(--border)}
.md-ev-break-label{
  font-size:.72rem;font-weight:700;color:var(--muted);
  background:var(--card);padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);white-space:nowrap;
}
/* أيقونات البداية/النهاية */
.md-ev-icon-row{
  width:100%;display:flex;justify-content:center;
  padding:6px 0;position:relative;z-index:1;
}
.md-ev-icon-row img{width:22px;height:22px;object-fit:contain;opacity:.6}
/* إحصائيات */
.md-stats-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:18px;margin-bottom:20px;
}
.md-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.md-stat-label{font-size:.78rem;color:var(--muted);width:120px;text-align:center}
.md-stat-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
.md-stat-fill-home{height:100%;background:var(--green2);border-radius:3px;transition:width .8s ease}
.md-stat-fill-away{height:100%;background:var(--gold);border-radius:3px;transition:width .8s ease}
.md-stat-vals{display:flex;justify-content:space-between;font-size:.78rem;font-weight:700;margin-bottom:4px}

/* skeleton loader */
.md-skeleton{
  background:linear-gradient(90deg,var(--border) 25%,rgba(0,0,0,.04) 50%,var(--border) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
  border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){
  .md-team-flag-wrap{width:56px;height:56px;font-size:1.7rem}
  .md-score-num{width:48px;height:48px;font-size:2rem}
  .md-team-name{font-size:.88rem}
  .md-channels-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
}


/* ══ LINEUP TABLE ══ */
.md-lineup-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:20px;overflow:hidden;
}
.md-lineup-tabs{
  display:flex;border-bottom:1px solid var(--border);background:var(--surface);
}
.md-lineup-tab{
  flex:1;padding:12px 10px;border:none;background:none;
  font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;
}
.md-lineup-tab img{width:22px;height:22px;object-fit:contain;border-radius:4px;}
.md-lineup-tab.active{color:var(--green2);background:var(--card);}
.md-lineup-tab.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--green2);border-radius:2px 2px 0 0;
}
.md-lineup-panel{display:none;}
.md-lineup-panel.active{display:block;}
.md-lineup-formation-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,166,81,.1);color:var(--green2);
  padding:2px 8px;border-radius:99px;font-size:.68rem;font-weight:800;
  letter-spacing:1px;margin-right:8px;
}
.md-player-table{width:100%;border-collapse:collapse;}
.md-player-table thead tr{background:linear-gradient(135deg,var(--surface),var(--card));}
.md-player-table thead th{
  padding:9px 12px;font-size:.68rem;font-weight:700;
  color:var(--muted);text-align:right;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
.md-player-table thead th.center{text-align:center;}
.md-player-row:hover td{background:rgba(0,166,81,.04);}

<script>
// ══════════════════════════════════════════════
//  CONFIG — عدّل هذا الرابط فقط
// ══════════════════════════════════════════════
const API_BASE = 'https://panel.elwady.dev/wegoal/api.php';

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let allMatches   = [];
let allNews      = [];
let allChannels  = [];
let settings     = {};

let currentDate        = todayStr();
let currentStatus      = 'all';
let currentTab         = 'matches';
let lastTabBeforeDetail    = 'matches';
let currentDetailMatch     = null;
let matchDetailRefreshTimer = null;
let _newsFromMatchDetail   = false;

function startMatchDetailRefresh(m) {
  stopMatchDetailRefresh();
  if (m.status !== 'live') return;
  matchDetailRefreshTimer = setInterval(function() {
    var apiId = m.api_id || m.apiId || m.game_id || null;
    if (apiId) fetchMatch365(m, apiId);
  }, 45000);
}

function stopMatchDetailRefresh() {
  if (matchDetailRefreshTimer) {
    clearInterval(matchDetailRefreshTimer);
    matchDetailRefreshTimer = null;
  }
}
let newsOffset         = 0;
const NEWS_PAGE        = 10;
let refreshInterval    = null;

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  await loadAll();
  buildDateStrip();
  renderMatches();
  renderChannelsSide();
  renderNewsSide();
  renderChannelsFull();

  // auto-refresh every 30s
  // refresh عام كل 60 ثانية
  refreshInterval = setInterval(async () => {
    await fetchMatches();
    renderMatches();
    updateLiveBadge();
    updateSideLive();
  }, 60000);

  // refresh سريع للمباريات المباشرة كل 20 ثانية
  setInterval(async () => {
    const hasLive = allMatches.some(m => m.status === 'live');
    if (!hasLive) return;
    await fetchMatches();
    updateLiveBadge();
    updateSideLive();
  }, 20000);
});

// ══════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════
async function api(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

async function loadAll() {
  const data = await api(`${API_BASE}?type=all`);
  if (!data) return;
  allMatches  = data.matches  || [];
  allNews     = data.news     || [];
  allChannels = data.channels || [];
  settings    = data.settings || {};
  applySettings();
}

async function fetchMatches() {
  const data = await api(`${API_BASE}?type=matches`);
  if (!data) return;
  // API يُرجع مصفوفة مباشرة أو { data: [...] }
  const matches = Array.isArray(data) ? data : (data.data || data.matches || null);
  if (matches && matches.length) allMatches = matches;
}

// ══════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════
function applySettings() {
  const name = 'مباريات لايف';
  const logo = 'logo.jpeg';

  document.title = name;

  const navTitle = document.getElementById('nav-title');
  if (navTitle) navTitle.innerHTML = name.replace(/(\d+)/, '<span>$1</span>');

  const footerTitle = document.getElementById('footer-title');
  if (footerTitle) footerTitle.textContent = name;

  if (logo) {
    const wrap = document.getElementById('nav-logo-wrap');
    if (wrap) {
      wrap.innerHTML = `<img src="logo.jpeg" alt="logo" style="width:36px;height:36px;object-fit:contain;border-radius:8px"/>`;
      wrap.style.background = 'none';
      wrap.style.padding = '0';
    }
  }
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function showTab(tab, btn) {
  // أخفِ أي صفحة تفاصيل مفتوحة وأعد الـ main
  document.getElementById('page-match-detail').style.display = 'none';
  document.getElementById('page-news-detail').style.display  = 'none';
  document.getElementById('page-main').style.display = '';

  currentTab = tab;

  // التابات
  ['matches','news','channels'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });

  // السايدبار — يظهر دائماً في جميع التابات
  const sidebar = document.getElementById('col-sidebar');
  if (sidebar) sidebar.style.display = '';

  // الأزرار النشطة
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    document.querySelectorAll('.nav-tab').forEach(b => {
      const txt = b.textContent.trim();
      if ((tab === 'news'     && txt.includes('خبر')) ||
          (tab === 'matches'  && txt.includes('مباراة')) ||
          (tab === 'channels' && txt.includes('قناة'))) {
        b.classList.add('active');
      }
    });
  }

  if (tab === 'news')     renderNewsFull();
  if (tab === 'channels') { renderChannelsFull(); }
}

// ══════════════════════════════════════════════
//  DATE STRIP
// ══════════════════════════════════════════════
function buildDateStrip() {
  const strip = document.getElementById('date-strip');
  const days  = [];
  for (let i = -2; i <= 5; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  strip.innerHTML = days.map(d => {
    const iso   = d.toLocaleDateString('en-CA', { timeZone: 'Asia/Riyadh' });
    const label = iso === todayStr()     ? 'اليوم'
                : iso === tomorrowStr()  ? 'الغد'
                : iso === yesterdayStr() ? 'أمس'
                : d.toLocaleDateString('ar-SA', { weekday:'short', timeZone:'Asia/Riyadh' });
    const num   = d.toLocaleDateString('ar-SA', { day:'numeric', month:'short', timeZone:'Asia/Riyadh' });
    const hasMatch = allMatches.some(m => (m.date||'').slice(0,10) === iso);
    return `<div class="date-btn${iso === currentDate ? ' active' : ''}" onclick="selectDate('${iso}',this)">
      <span class="date-day">${num}</span>
      <span class="date-label">${label}${hasMatch ? ' •' : ''}</span>
    </div>`;
  }).join('');
}

function selectDate(date, el) {
  currentDate = date;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMatches();
}

// ══════════════════════════════════════════════
//  STATUS FILTER
// ══════════════════════════════════════════════
function setStatusFilter(status, btn) {
  currentStatus = status;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches();
}

function filterLive() {
  currentStatus = 'live';
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes('مباشر'));
  });
  renderMatches();
}

// ══════════════════════════════════════════════
//  MATCHES RENDER
// ══════════════════════════════════════════════
function getFilteredMatches() {
  return allMatches.filter(m => {
    const dateOk   = !currentDate || (m.date||'').slice(0,10) === currentDate;
    const statusOk = currentStatus === 'all' || m.status === currentStatus;
    return dateOk && statusOk;
  }).sort(function(a, b) {
    var order = { live:0, upcoming:1, finished:2 };
    var sa = order[a.status] !== undefined ? order[a.status] : 1;
    var sb = order[b.status] !== undefined ? order[b.status] : 1;
    if (sa !== sb) return sa - sb;
    // نفس الحالة: رتّب بالوقت
    var ta = (a.date||'') + (a.time||'');

  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatTime(t) {
  if (!t) return '';
  try {
    const [h, m] = t.split(':').map(Number);
    const ampm   = h >= 12 ? 'م' : 'ص';
    const h12    = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  } catch { return t; }
}

function tomorrowStr() {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toLocaleDateString('en-CA', { timeZone:'Asia/Riyadh' });
}
function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);

async function fetchMatch365(localMatch, apiId) {
  // نجلب عبر api.php لتجنب CORS
  try {
    const proxyUrl = API_BASE + '?type=match365&api_id=' + encodeURIComponent(apiId);
    let r    = await fetch(proxyUrl);
    let data = await r.json();
    // إذا أعاد الـ proxy البيانات مباشرة داخل data365
    if (data && data.game) {
      renderMatchFull(localMatch, data);
      return;
    }
    // fallback: محاولة مباشرة (قد تنجح في بعض البيئات)
    r    = await fetch(SCORES_BASE + apiId);
    data = await r.json();
    renderMatchFull(localMatch, data);
  } catch(e) {
    // fallback مباشر أخير
    try {
      const r    = await fetch(SCORES_BASE + apiId);
      const data = await r.json();
      renderMatchFull(localMatch, data);
    } catch(e2) {
      renderMatchFull(localMatch, null);
    }
  }
}

function renderMatchFull(localMatch, data365) {
  const game     = (data365 && data365.game) ? data365.game : {};
  const home     = game.homeCompetitor || {};
  const away     = game.awayCompetitor || {};

  // احفظ competitor IDs في allMatches لاستخدامها في الشعارات
  if (home.id || away.id) {
    var mIdx = allMatches.findIndex(function(x){ return x.id === localMatch.id; });
    if (mIdx > -1) {
      if (home.id) allMatches[mIdx]._homeCompId = home.id;
      if (away.id) allMatches[mIdx]._awayCompId = away.id;
      localMatch._homeCompId = home.id;
      localMatch._awayCompId = away.id;
    }
  }
  const isUp     = localMatch.status === 'upcoming';
  const isLive   = localMatch.status === 'live';
  const homeScore = (!isUp && localMatch.homeScore >= 0) ? localMatch.homeScore : (home.score != null ? home.score : '–');
  const awayScore = (!isUp && localMatch.awayScore >= 0) ? localMatch.awayScore : (away.score != null ? away.score : '–');

  // شعارات الفرق
  const homeLogo = home.id ? 'https://imagecache.365scores.com/image/upload/f_png,w_80,h_80,c_limit,q_auto:eco,dpr_2,d_Competitors:default1.png/v1/Competitors/' + home.id : '';
  const awayLogo = away.id ? 'https://imagecache.365scores.com/image/upload/f_png,w_80,h_80,c_limit,q_auto:eco,dpr_2,d_Competitors:default1.png/v1/Competitors/' + away.id : '';

  function teamImg(logoUrl, name, fallbackEmoji) {
    if (!logoUrl) return ["<span style=\"font-size:2rem\">", fallbackEmoji, "</span>"].join("");
    var img = document.createElement("img");
    img.className = "md-team-flag-img";
    img.src = logoUrl;
    img.alt = name;
    img.loading = "lazy";
    img.onerror = function(){ this.style.display="none"; };
    return img.outerHTML;
  }

  const homeFlag  = teamImg(homeLogo, localMatch.home, teamEmoji(localMatch.home));
  const awayFlag  = teamImg(awayLogo, localMatch.away, teamEmoji(localMatch.away));
  const venue     = game.venue || {};
  const official  = (game.officials && game.officials[0]) ? game.officials[0] : {};

  // ── القنوات ──────────────────────────────────────
  var rawChs = localMatch.channels || [];
  if (typeof rawChs === 'string') {
    rawChs = rawChs.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  }

  // ── معلومات المباراة (style match-info.html main_area_5) ──
  (function() {

    var infoRows = [];

    // التاريخ
    if (matchTs) {
      var dObj = new Date(matchTs * 1000);
      var days  = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
      var months= ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

      infoRows.push({ cls:'md-icon-date', icon:'📅', label:'التاريخ', val: dateStr });
    }

    // التوقيت
    if (matchTs) {
      var tObj = new Date(matchTs * 1000);
      var timeStr = tObj.toLocaleString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})
                       .replace('AM','ص').replace('PM','م');
      infoRows.push({ cls:'md-icon-time', icon:'🕐', label:'التوقيت', val: 'الساعة ' + timeStr + ' بتوقيتك المحلي' });
    }

    // البطولة
    var leagueName = '';
    if (game.competitionDisplayName) {
      leagueName = (game.competitionDisplayName.split('-')[0]).split(', ').pop();
    }
    if (leagueName) infoRows.push({ cls:'md-icon-stage', icon:'🏆', label:'البطولة', val: leagueName });

    // الملعب
    var stadiumName = '';
    if (venue.name) stadiumName = venue.name.replace('ملعب ','');
    if (stadiumName) infoRows.push({ cls:'md-icon-stadium', icon:'🏟️', label:'الملعب', val: stadiumName });

    // سعة الملعب / الحضور
    var attendance = '';
    if (venue.attendance) attendance = Number(venue.attendance).toLocaleString('ar') + ' متفرج';
    else if (venue.capacity) attendance = Number(venue.capacity).toLocaleString('ar') + ' متفرج';
    if (attendance) infoRows.push({ cls:'md-icon-cap', icon:'👥', label:'سعة الملعب', val: attendance });

    // الحكم
    if (official.name) infoRows.push({ cls:'md-icon-referee', icon:'🎽', label:'الحكم', val: official.name });

    if (infoRows.length) {
      html += '<div class="md-info-card">';

      html += '<div class="md-info-rows">';
      infoRows.forEach(function(x) {
        html += '<div class="md-info-row">';
        html += '<div class="md-info-row-icon ' + x.cls + '">' + x.icon + '</div>';
        html += '<div class="md-info-row-body">';
        html += '<div class="md-info-row-label">' + x.label + '</div>';
        html += '<div class="md-info-row-val">'   + esc(x.val) + '</div>';
        html += '</div></div>';
      });
      html += '</div></div>';

  })();

  // القنوات الناقلة
  if (chObjs.length) {
    html += '<div class="md-channels-section">';
    html += '<div class="md-section-title">📡 القنوات الناقلة</div>';
    html += '<div class="md-channels-grid">';
    chObjs.forEach(function(ch) {
      var url  = ch.url || ch.code || '#';
      var bg   = ch.color ? ch.color + '33' : '#e8f5e933';
      var fg   = ch.color || '#007a3d';
      var logo;
      if (ch.logo) {
        var chImg = document.createElement('img'); chImg.className='md-ch-logo'; chImg.src=esc(ch.logo); chImg.alt=esc(ch.name); chImg.loading='lazy'; chImg.onerror=function(){this.style.display='none';}; logo=chImg.outerHTML;
      } else {

      html += logo;
      html += '<div class="md-ch-name">' + esc(ch.name) + '</div>';
      html += '<div class="md-ch-play"><i class="fa fa-play" style="font-size:.55rem"></i> مشاهدة</div>';
      html += '</a>';
    });
    html += '</div></div>';
  }

  // ── أحداث المباراة (بنية match-info.html) ──
  if (events365.length) {
    // أيقونات من match-info.html
    var EV_ICONS_URL = {
      goal:         'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgWDBVYyIbI2y7VUpW2Yu85z9BKTqiW9UQNFPqO5_vBDzevPXWtLHL8JimQY349G1zLBasQ5am4MAvMaN5Gmt_xD-3S6yiFD1yHAYX2zftsmQBkSwQqeCioQF5NP8NEhK-n53-68GBEwibQQs5qc3VbqEjWu3KcK_AZr0W1D_IidJdZblsMBWy8r-8wdGA/s600/goal.png',
      own_goal:     'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgiBmaUdsySdoH9P0im0uuInoM0rAMm3hHKWUzGyMZ-We_wJdLta_M8B0hwGNaQp0KEkYxyuX2Q9aeeyW5Eabu973xiE3Oxl9RGNd5QR-k9ICRUuTj697QzXTF7EOEFKieNWcPKr937WGHcBdtNJ9wGiNxkw9BvuDl1hpqTlg-rdJ_lwVeRIHm8zKhRUrs/s600/own_goal.png',
      penalty_goal: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjrzb9nlP20DZNK-QJY0gnxhfBd8uAj1jMdYnrnDH2VDpvoJehH8rRu09woIqdO7g62xLDLZsQb4dLeZrZRJkwBCLAwCOmdPoQmixWbXkPTMy6puxk6x1VE7sk4P2y5DrPnAkV-ItCbLUk8W_3kG2KM15Y7j6YK2McLQpTPsP8GQZKShI3k6wE6jRY6N1o/s600/picon.png',
      penalty_miss: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjm7prDz3jSl3K6cXstfqbTJwb_-ZrdS2Q-9oKxgq5e9tlLgeAj5IjhTmmtdbWAjD0YuRQcECCA-yyReuwk75NeRrTbF2bpwFJQcGJ9WWTeA22Zqruxhd6AsRyinlR2iXPid5bX_zOCMXTsz_0ALDDu1rvesQwSp-fXHgpmSOQORXv5cDhMOr0l5SNoYLU/s600/pmicon.png',
      yellow_card:  'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjMZlEBfpR_zb-90JMwo77UdjanRGmhhbPdwhdMaxtxRsC9ahuizxyT2ZBUYGUGq1CEfJo6HMZBKq95X3ZGa1M0hazf8m5lZuO6R17qsT4EzpOeDzx-nmTRtpyQlBmutvrSWegKHhuPh7KwlxcmWFFQUIZox_Lr_ksZ1Yno0OYPKWFSScrheBnWGTPAnv0/s600/ev_yellow_card.png',
      red_card:     'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi29hhesdR5lXT7m-FsTfbuuOF6bhmiv0AwhPPGXfWwOil4WxX1Por6EVv7xMPL6xTJlhjLjioAcF01R6nj_eieJBhy-Yql8_-jIQ3XUlRQUgtn9DfBemFGBfPhe5LZqjCBKJUQFDENnY7oSn5Dle6jwB1ah7PJ-k1n3TNUgt2NYjwjzo5wsx6MKXaOtks/s600/ev_red_card.png',
      red_card2:    'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj9N_6wt16MCG16Vbb2r5mR1cR2355yn2aIDEiIQHm7A3gnYzNQiahfbj8ix7cOupZ4FeaJaSyzpj7WnXxUA4QaHxvNHFKsPqpl-nIDHFQg4ibRYBfrP0c9k_wZEjbhIRAHC5XP6v3cHUzxbx0DkQLb6x8Y-p-m1f61Qk1VzfbFWO1VFAGv09gO54TZ7sc/s600/ev_red_card2.png',
      substitution: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjAQCDtzVwSSmH5CT737LHzuy9g6iyFg7ca8sKa5uHrPvG9wfTVwNX9s-Ksz0fOhwr7hinp-HF2vOFVXyV0xerFjGpIR8HxKnMWZON7MryjqiiHkFyvulbCpOf_bQnXCdQI48qXLN04BGGuHNAN_ADCiSjrKz0u3hApVns7zBR8RiN2Gpv1t7cM19nyQkI/s600/ev_substitution.png',
      offside:      'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjuSXGOlHOLPlFUdiSvvWepGr4o8orRLhWFCfGDdBxOmHgOL-I0teT_gKi1R5icG22LmYUzvrb569_3ZWaXzYJUlypc4__ZwZdmNzi5H5LbYsRKrEw_eEVwtsrLm5vd5qYbuS_7nvi3FkhQKwbw8Z0kDpV6iX1ed4nZdgntyT6hJqCtpVnZIkwBpN9COYc/s600/ev_offside.png',
      woodwork:     'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjkZGt2we1PKsShhRfqJiasfCfSV8d4Rl9Kt5oTaKpC63Pd3ynCOhqR-d6BDt-dcHa-b8In2vdKe6dV5NuKl7RgYsMDXs1BZ-sZhHUdoFm2G5gj_y1dk95mvNJCUSg-msG7KyMi-PNrMNIbTVld30U2wCFgJq5t_0AHkTqt3HM0Hpx_06l07M1nJa2u8P8/s600/ev_woodwork.png',
      whistle:      'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEguDGUgeJEVisPzlkSmsUUiGAme5FplnR4qGhnpNPhwuz5-h_MIFnLHGBlMxOj28cOd6VqTNkwHU7Gkdm1UR-2HeI3Vfn5Sung4k4Al667l6HzCY8wsx_LcCM7q6VPCB_uZX-xZd7K3S6fmWlIfEQM5RM7xt5GxrFniFmGu6v2KdVnscvdhm0Awghy9_tc/s600/whistle.png',
      stopwatch:    'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgLYR8socv5mYF3y3Ry_ymjBHTS35Z-5itzhSEkkAFDD5hWt-nJ8gZ6Srt5xFD28wXXLj8RdDGNMlmy1kAr1SY3Mj_zlCMtO4bWptTC6h6WzS3nTDbtsU6ideHAWKlagHxaNq2JWN1ZjLwKvU1gh6dZQa2wOmynqzl3cMxjXs6mnyig1VftHQJWxWvtIDE/s600/stopwatch.png'
    };

    if (data365 && data365.game && data365.game.stages) {
      data365.game.stages.forEach(function(s) {
        if (s.id===7)  { halfH=s.homeCompetitorScore; halfA=s.awayCompetitorScore; }
        if (s.id===9)  { fullH=s.homeCompetitorScore; fullA=s.awayCompetitorScore; }
        if (s.id===11) { penH=s.homeCompetitorScore;  penA=s.awayCompetitorScore;  }
      });
    }

    var hasMain = false; var hasAll = false;
    var evHtml = ''; var halfInserted = false; var fullInserted = false;

    events365.forEach(function(e) {
      var evTime  = e.gameTime;
      var evTeam  = e.competitorId;
      var side    = (evTeam === home.id) ? 'home' : 'away';
      var evTypeObj = e.eventType || {};
      var evId    = evTypeObj.id   || e.typeId || 0;
      var subId   = evTypeObj.subTypeId || 0;
      var playerId = e.playerId;
      var playerName = (playerMap[playerId] && playerMap[playerId].name) ? playerMap[playerId].name : '';

      // اللاعب البديل / المساعد
      var assistId   = (e.extraPlayers && e.extraPlayers[0]) ? e.extraPlayers[0] : '';
      var assistName = (assistId && playerMap[assistId]) ? playerMap[assistId].name : '';

      // تحديد نوع الحدث
      var evType = '';
      if (evId===1000)                     evType = 'substitution';
      else if (evId===2)                   evType = 'yellow_card';
      else if (evId===3 && subId!==21)     evType = 'red_card';
      else if (evId===3 && subId===21)     evType = 'red_card2';
      else if (evId===1 && subId!==2 && subId!==3) evType = 'goal';
      else if (evId===1 && subId===2)      evType = 'own_goal';
      else if (evId===1 && subId===3)      evType = 'penalty_goal';
      else if (evId===6)                   evType = 'penalty_miss';
      else if (evId===11)                  evType = 'offside';
      else if (evId===12)                  evType = 'woodwork';
      if (!evType || !playerName) return;

      // هل هو حدث رئيسي؟
      var importance = 'all';

      // فاصل نهاية الشوط الأول
      if (!halfInserted && halfH!=='' && evTime > 45) {
        evHtml += '<div class="md-ev-break" data-importance="both"><div class="md-ev-break-line"></div>';
        evHtml += '<div class="md-ev-break-label">نهاية الشوط الأول ' + halfH + ' - ' + halfA + '</div>';
        evHtml += '<div class="md-ev-break-line"></div></div>';
        halfInserted = true;
      }
      // فاصل نهاية الشوط الثاني
      if (!fullInserted && fullH!=='' && evTime > 90) {
        evHtml += '<div class="md-ev-break" data-importance="both"><div class="md-ev-break-line"></div>';
        evHtml += '<div class="md-ev-break-label">نهاية الوقت الأصلي ' + fullH + ' - ' + fullA + '</div>';
        evHtml += '<div class="md-ev-break-line"></div></div>';
        fullInserted = true;
      }

      var iconSrc = EV_ICONS_URL[evType] || '';
      var iconHtml = iconSrc ? '<img class="md-ev-icon" src="' + iconSrc + '" alt="">' : '';

      // نص الحدث
      var nameHtml = '<div class="md-ev-name">' + esc(playerName) + '</div>';
      var subHtml  = '';
      if (evType === 'substitution' && assistName) {
        subHtml = '<div class="md-ev-sub in">' + esc(assistName) + '</div>';
        nameHtml = '<div class="md-ev-name md-ev-sub out">' + esc(playerName) + '</div>';
      } else if (evType === 'goal' && assistName) {
        subHtml = '<div class="md-ev-sub">↳ ' + esc(assistName) + '</div>';
      }

      var evMinStr = evTime + String.fromCharCode(39);
      evHtml += '<div class="md-ev-row ' + side + '" data-min="' + evMinStr + '" data-importance="' + importance + '">';
      if (side === 'home') {
        evHtml += iconHtml + '<div class="md-ev-text">' + nameHtml + subHtml + '</div>';
      } else {
        evHtml += '<div class="md-ev-text">' + nameHtml + subHtml + '</div>' + iconHtml;
      }
      evHtml += '</div>';
    });

    if (evHtml) {
      html += '<div class="md-events-section">';
      html += '<div class="md-section-title">⚡ أحداث المباراة</div>';
      // أزرار الفلتر
      html += '<div class="md-ev-icon-row"><img src="' + EV_ICONS_URL.stopwatch + '" alt=""></div>';
      html += '<div id="md-ev-area">' + evHtml + '</div>';
      html += '<div class="md-ev-icon-row"><img src="' + EV_ICONS_URL.whistle + '" alt=""></div>';
      html += '</div>';
    }
  }

  // إحصائيات
  if (stats365.length) {
    html += '<div class="md-stats-section">';
    html += '<div class="md-section-title">📊 إحصائيات المباراة</div>';
    stats365.slice(0, 10).forEach(function(s) {
      var hv    = s.homeValue != null ? s.homeValue : 0;
      var av    = s.awayValue != null ? s.awayValue : 0;
      var total = (hv + av) || 1;
      var hPct  = Math.round(hv / total * 100);
      var aPct  = 100 - hPct;
      var pct   = s.type === 'possession' ? '%' : '';
      html += '<div>';
      html += '<div class="md-stat-vals">';
      html += '<span style="color:var(--green2)">' + hv + pct + '</span>';
      html += '<span style="color:var(--muted);font-size:.72rem">' + esc(s.name || '') + '</span>';
      html += '<span style="color:var(--gold)">' + av + pct + '</span>';
      html += '</div>';
      html += '<div class="md-stat-row">';
      html += '<div class="md-stat-bar" style="direction:ltr"><div class="md-stat-fill-home" style="width:' + hPct + '%"></div></div>';
      html += '<div class="md-stat-bar" style="direction:ltr"><div class="md-stat-fill-away" style="width:' + aPct + '%;background:var(--gold)"></div></div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  if (!data365) {
    html += '<div class="empty" style="padding:20px"><p>تعذّر جلب تفاصيل المباراة من 365scores</p></div>';
  }

  // ── تشكيلة الفريقين ──
  var homeLineup = (home.lineups && home.lineups.members) ? home.lineups.members : [];
  var awayLineup = (away.lineups && away.lineups.members) ? away.lineups.members : [];
  var homeFmt    = (home.lineups && home.lineups.formation) ? home.lineups.formation : '';
  var awayFmt    = (away.lineups && away.lineups.formation) ? away.lineups.formation : '';
  var homeLogo2  = home.id ? 'https://imagecache.365scores.com/image/upload/f_png,w_80,h_80,c_limit,q_auto:eco,dpr_2,d_Competitors:default1.png/v1/Competitors/' + home.id : '';
  var awayLogo2  = away.id ? 'https://imagecache.365scores.com/image/upload/f_png,w_80,h_80,c_limit,q_auto:eco,dpr_2,d_Competitors:default1.png/v1/Competitors/' + away.id : '';

  // حساب إحصائيات التشكيلة من الأحداث
  var luStats = { goal:[], yellow:[], red:[], substitute:[] };
  events365.forEach(function(ev) {
    var evId  = (ev.eventType || {}).id || ev.typeId || 0;
    var subId = (ev.eventType || {}).subTypeId || 0;
    var pid   = ev.playerId;
    if (!pid) return;
    if (evId===1 && subId!==2) luStats.goal.push(pid);
    if (evId===2)              luStats.yellow.push(pid);
    if (evId===3)              luStats.red.push(pid);
    if (evId===1000 && ev.extraPlayers && ev.extraPlayers[0])
                               luStats.substitute.push(ev.extraPlayers[0]);
  });

  // تحقق من اكتمال التشكيلة (على الأقل 5 لاعبين في كل فريق)
  var homeStarters = homeLineup.filter(function(m){ return m.status===1||m.statusId===1; });
  var awayStarters = awayLineup.filter(function(m){ return m.status===1||m.statusId===1; });
  if (!homeStarters.length) homeStarters = homeLineup.slice(0,11);
  if (!awayStarters.length) awayStarters = awayLineup.slice(0,11);
  var lineupValid = homeStarters.length >= 5 || awayStarters.length >= 5;

  if (lineupValid) {
    window._mdLineupData = {
      home: { members: homeLineup, starters: homeStarters, formation: homeFmt, logo: homeLogo2, name: localMatch.home },
      away: { members: awayLineup, starters: awayStarters, formation: awayFmt, logo: awayLogo2, name: localMatch.away },
      playerMap: playerMap,
      lineupStats: luStats
    };
    html += mdBuildLineupHTML();
  } else {
    window._mdLineupData = null;
  }

  document.getElementById('md-content').innerHTML = html;
}

// ── تشكيلة الفريقين — جدول عصري ──
function mdBuildLineupHTML() {
  var data = window._mdLineupData;
  if (!data) return '';
  var h = '';
  h += '<div class="md-lineup-section">';

  // ─ عنوان بنفس نمط القنوات والمعلومات ─

function mdBuildPlayerTable(members, playerMap, luStats, label) {
  var hasRating = members.some(function(m){ return m.ranking != null; });
  var h = '';
  h += '<div style="padding:10px 14px 4px;font-size:.72rem;font-weight:800;color:var(--muted);letter-spacing:.05em;border-bottom:1px solid var(--border)">' + label + '</div>';
  h += '<table class="md-player-table"><thead><tr>';
  h += '<th class="center" style="width:44px">#</th>';
  h += '<th>اللاعب</th>';
  h += '<th class="center" style="width:70px">أحداث</th>';
  if (hasRating) h += '<th class="center" style="width:52px">التقييم</th>';
  h += '</tr></thead><tbody>';

  members.forEach(function(member) {
    var pid   = member.id;
    var pInfo = playerMap[pid] || {};
    var aid   = pInfo.athleteId || member.athleteId || '';
    var pNum  = pInfo.number    || member.jerseyNumber || '';
    var name  = pInfo.shortName || pInfo.name || member.name || '—';
    var posRaw = pInfo.position || member.position || '';
    var pos = typeof posRaw === 'object' ? (posRaw.name || posRaw.shortName || '') : posRaw;
    var pLogo = aid ? 'https://imagecache.365scores.com/image/upload/f_png,w_70,h_70,c_limit,q_auto:eco,dpr_2,d_Athletes:default.png,r_max,c_thumb,g_face,z_0.65/v1/Athletes/' + aid : '';

    var hasGoal = luStats.goal       && luStats.goal.indexOf(pid)       > -1;
    var hasYel  = luStats.yellow     && luStats.yellow.indexOf(pid)     > -1;
    var hasRed  = luStats.red        && luStats.red.indexOf(pid)        > -1;
    var hasSub  = luStats.substitute && luStats.substitute.indexOf(pid) > -1;
    var rating  = member.ranking;

    h += '<tr class="md-player-row">';

    // رقم القميص
    h += '<td style="text-align:center">';
    h += pNum ? '<span class="md-player-num">' + esc(String(pNum)) + '</span>' : '<span style="color:var(--muted);font-size:.75rem">—</span>';
    h += '</td>';

    // صورة + اسم + مركز
    h += '<td><div class="md-player-name-cell">';
    if (pLogo) {
      h += '<img class="md-player-avatar" src="' + esc(pLogo) + '" onerror="this.src=&quot;&quot;" alt="' + esc(name) + '">';
    } else {
      h += '<div class="md-player-avatar" style="display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted)">' + esc(name.charAt(0)) + '</div>';
    }
    h += '<div><div class="md-player-name">' + esc(name) + '</div>';
    if (pos) h += '<div class="md-player-pos">' + esc(pos) + '</div>';
    h += '</div></div></td>';

    // الأحداث
    h += '<td><div class="md-player-badges">';
    if (hasGoal) h += '<span class="md-badge-goal" title="هدف">⚽</span>';
    if (hasRed)  h += '<span class="md-badge-red"   title="بطاقة حمراء"></span>';
    else if (hasYel) h += '<span class="md-badge-yellow" title="بطاقة صفراء"></span>';
    if (hasSub)  h += '<span class="md-badge-sub"   title="تبديل">🔄</span>';
    h += '</div></td>';

    // التقييم
    if (hasRating) {
      h += '<td style="text-align:center">';
      if (rating != null) {
        var rt  = parseFloat(rating).toFixed(1);
        var cls = rt >= 7 ? 'md-rating-high' : rt >= 6 ? 'md-rating-medium' : 'md-rating-low';
        h += '<span class="md-player-rating ' + cls + '">' + rt + '</span>';
      }
      h += '</td>';
    }

    h += '</tr>';
  });

  h += '</tbody></table>';
  return h;
}

function slugify(text) {
  return (text || '')
    .replace(/\s+/g, '-')
    .replace(/[^؀-ۿ\w-]/g, '')
    .replace(/-+/g, '-')
    .toLowerCase()
    .slice(0, 80);
}

function showNewsDetail(newsId) {
  // ابحث في الكاش أولاً
  const cached = allNews.find(n => n.id === newsId);
  _renderNewsDetail(cached || null, newsId);
  // جلب كامل من API
  fetch(`${API_BASE}?type=news&id=${encodeURIComponent(newsId)}`)
    .then(r => r.json()).then(n => { if (n && n.id) _renderNewsDetail(n, newsId); })
    .catch(()=>{});
}

function setMeta(name, val) {
  if (val === undefined || val === null) return;
  val = String(val);
  // og: و article: تستخدم property | twitter: و description تستخدم name
  var isProp = name.startsWith('og:') || name.startsWith('article:');
  var attr   = isProp ? 'property' : 'name';
  var sel    = 'meta[' + attr + '="' + name + '"]';
  var el     = document.querySelector(sel);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute(attr, name);
    document.head.appendChild(el);
  }
  el.setAttribute('content', val);
}

// معالجة الـ URL عند التحميل أو التنقل
function handleHashRoute() {
  const hash = location.hash;
  if (hash.startsWith('#news/')) {
    const newsId = hash.slice(6);
    if (newsId) showNewsDetail(newsId);
  } else if (hash.startsWith('#match/')) {
    const parts = hash.slice(7).split('-');
    const matchId = parts[parts.length - 1];
    if (matchId) {
      // ابحث في allMatches بعد التحميل
      const tryOpen = () => {
        const m = allMatches.find(x => x.id === matchId);
        if (m) openMatchDetail(m);
      };
      if (allMatches.length) tryOpen();
      else setTimeout(tryOpen, 1200);
    }
  } else {
    // استخدم showTab لضمان الحالة الصحيحة
    showTab(lastTabBeforeDetail || currentTab || 'matches', null);
  }
}

window.addEventListener('popstate', e => {
  handleHashRoute();
});
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(handleHashRoute, 800); // بعد تحميل البيانات
});

function openStreamModal(ch) {
  showInterstitialAd();
  var url = ch.url || '';
  if (!url || url === '#') {
    showToast('لا يوجد رابط بث لهذه القناة', 'error');
    return;
  }

  var overlay    = document.getElementById('stream-modal');
  var nameEl     = document.getElementById('stream-modal-ch-name');
  var iframeWrap = document.getElementById('stream-iframe-wrap');
  var loading    = document.getElementById('stream-loading');

  nameEl.textContent = ch.name || 'بث مباشر';

  // إزالة iframe قديم
  var oldIframe = iframeWrap.querySelector('iframe');
  if (oldIframe) oldIframe.remove();
  loading.style.display = 'flex';

  // إنشاء iframe جديد
  var iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture; camera; microphone; display-capture; web-share';
  iframe.allowFullscreen = true;
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('allowpaymentrequest', '');
  iframe.setAttribute('scrolling', 'no');
  iframe.setAttribute('referrerpolicy', 'no-referrer');
  iframe.setAttribute('importance', 'high');
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  iframe.onload = function() { loading.style.display = 'none'; };
  iframeWrap.appendChild(iframe);

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeStreamModal(e, force) {
  if (!force && e && e.target !== document.getElementById('stream-modal')) return;
  var overlay    = document.getElementById('stream-modal');
  var iframeWrap = document.getElementById('stream-iframe-wrap');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  var iframe = iframeWrap.querySelector('iframe');
  if (iframe) {
    iframe.src = 'about:blank';
    setTimeout(function(){ if (iframe.parentNode) iframe.remove(); }, 300);
  }
}

function toggleTheme() {
  const html   = document.documentElement;
  const icon   = document.getElementById('theme-icon');
  const isDark = html.getAttribute('data-theme') === 'dark';

  if (isDark) {
    // التحويل إلى فاتح
    html.removeAttribute('data-theme');
    icon.className = 'fa fa-moon';
    localStorage.setItem('wc2026-theme', 'light');
  } else {
    // التحويل إلى داكن
    html.setAttribute('data-theme', 'dark');
    icon.className = 'fa fa-sun';
    localStorage.setItem('wc2026-theme', 'dark');
  }
}
