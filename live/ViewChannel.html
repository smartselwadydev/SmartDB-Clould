<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    $.ajax({
        type: 'GET',
        url: 'https://panel.elwady.dev/wegoal/api.php?type=channels&id=' + id,
        dataType: 'json'
    }).then(function(res) {
        var rawData = res.data.code;
        var lines = rawData.split('\n');

        // تنظيف الحاويات قبل البدء
        $('.nav-pills').empty();
        $('.tab-content').empty();

        lines.forEach(function(line, index) {
            if(line.trim() === "") return; // تخطي الأسطر الفارغة
            
            var title = index + 1;
            var isActive = index === 0 ? 'active' : '';
            var isShowActive = index === 0 ? 'show active' : '';

            // 1. إضافة الأزرار
            $('.nav-pills').append(`
                <li class="nav-item">
                    <button class="nav-link ${isActive}" 
                            data-bs-toggle="pill" 
                            data-bs-target="#server_${index}" 
                            type="button"
                            data-link="${line.trim()}">
                        Server ${title}
                    </button>
                </li>`);

            // 2. إضافة محتوى التبويب (فارغ مبدئياً)
            $('.tab-content').append(`
                <div id="server_${index}" class="tab-pane fade ${isShowActive}">
                    <div class="iframe-placeholder">
                        ${index === 0 ? `<iframe src="${line.trim()}" style="width:100%;height:300px;" frameborder="0" allowfullscreen></iframe>` : ''}
                    </div>
                </div>`);
        });

        // 3. التحكم في التحميل عند التبديل
        $(document).on('shown.bs.tab', 'button[data-bs-toggle="pill"]', function (e) {
            // إيقاف وحذف أي iframe في التبويب السابق
            var prevTarget = $(e.relatedTarget).data('bs-target');
            $(prevTarget).find('.iframe-placeholder').empty();

            // تحميل الـ iframe في التبويب الحالي النشط
            var currentTarget = $(e.target).data('bs-target');
            var videoUrl = $(e.target).data('link');
            
            $(currentTarget).find('.iframe-placeholder').html(
                `<iframe src="${videoUrl}" style="width:100%;height:300px;" frameborder="0" allowfullscreen></iframe>`
            );
        });
    });
</script>
